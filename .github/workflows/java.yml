name: Java with Docker
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-with-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start PostgreSQL
        run: |
          docker run -d --name temp_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres_root \
            -e POSTGRES_DB=postgres \
            -v ${{ github.workspace }}/database/init.sql:/docker-entrypoint-initdb.d/init.sql \
            -p 5432:5432 \
            postgres:15-alpine
          echo "Waiting for PostgreSQL..."
          until docker exec temp_db pg_isready -U postgres; do sleep 2; done
          echo "PostgreSQL ready"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install API dependencies
        working-directory: ./api
        run: npm install

      - name: Start API in background
        working-directory: ./api
        run: |
          DB_HOST=localhost DB_PORT=5432 DB_NAME=temperatures \
          DB_USER=api_user DB_PASSWORD=secret \
          node index.js &
          sleep 3
          echo "API started"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Transformer dependencies
        working-directory: ./transformer
        run: pip install flask pytest requests

      - name: Start Transformer in background
        working-directory: ./transformer
        run: |
          python app.py &
          sleep 3
          echo "Transformer started"

      - name: Install Sampler dependencies
        working-directory: ./sampler
        run: npm install

      - name: Start Sampler in background
        working-directory: ./sampler
        run: |
          node server.js &
          sleep 3
          echo "Sampler started"

      - name: Build Docker image
        run: docker build -t java-docker-demo .

      - name: Run Docker container
        run: |
          HOST_IP=$(ip route show default | awk '/default/ {print $3}')
          echo "Host IP: $HOST_IP"
          docker run --add-host=host.docker.internal:$HOST_IP \
            -e SAMPLER_URL=http://host.docker.internal:3000/sample \
            java-docker-demo

      - name: Integration test — POST and GET /temperature
        run: |
          # Store a reading via the transformer's conversion (2.5V → 50.0°C)
          RESPONSE=$(curl -sf -X POST http://localhost:3000/temperature \
            -H "Content-Type: application/json" \
            -d '{"temperature": 50.0, "timestamp": "2026-03-10T14:20:00Z"}')
          echo "POST response: $RESPONSE"

          ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Stored with id=$ID"

          # Retrieve it back by ID
          GET_RESPONSE=$(curl -sf http://localhost:3000/temperature/$ID)
          echo "GET response: $GET_RESPONSE"

          echo "Integration test passed"

  sampler-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./sampler
        run: npm install

      - name: Run unit tests
        working-directory: ./sampler
        run: npm test

      - name: Report success
        if: success()
        run: echo "Sampler tests passed"

      - name: Report failure
        if: failure()
        run: echo "Sampler tests failed"

  transformer-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./transformer
        run: pip install flask pytest requests

      - name: Run unit tests
        working-directory: ./transformer
        run: pytest test_transformer.py

      - name: Report success
        if: success()
        run: echo "Transformer tests passed"

      - name: Report failure
        if: failure()
        run: echo "Transformer tests failed"